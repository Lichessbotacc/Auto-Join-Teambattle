name: Auto Join Team Battle

permissions:
  contents: write   # nötig, damit der Workflow ins Repo zurückcommitten darf

on:
  schedule:
    - cron: '*/10 * * * *'   # alle 10 Minuten
  workflow_dispatch:          # manuell startbar über GitHub UI

jobs:
  join:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Skript ausführen
        env:
          LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
        run: python3 auto_join_team_battle.py

      - name: Aktualisierte seen_tournaments.json zurückcommitten
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f seen_tournaments.json ]; then
            git add seen_tournaments.json
            git diff --staged --quiet || git commit -m "Update seen tournaments"
            git push
          else
            echo "seen_tournaments.json existiert nicht, überspringe Commit."
          fi
